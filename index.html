<!doctype html>
<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#003082" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Treintje" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Treintje</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
    (function(){
      var p = new URLSearchParams(location.search);
      var src = "https://t.michielb.nl/wa/t.gif?" +
        "u=" + encodeURIComponent(location.href) +
        "&r=" + encodeURIComponent(document.referrer) +
        "&t=Treintje" +
        "&s=" + screen.width + "x" + screen.height +
        "&sid=treintje&lang=nl&slug=" +
        "&mb_source=" + encodeURIComponent(p.get("mb_source") || "") +
        "&mb_medium=" + encodeURIComponent(p.get("mb_medium") || "") +
        "&mb_campaign=" + encodeURIComponent(p.get("mb_campaign") || "") +
        "&mb_term=" + encodeURIComponent(p.get("mb_term") || "") +
        "&mb_content=" + encodeURIComponent(p.get("mb_content") || "") +
        "&_=" + Date.now();
      new Image().src = src;
    })();
    </script>
  </body>
</html>
